<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>All in 1 Shop</title>
</head>
<body>
    <div id="container">
        <header>
            <h1>Welcome to All in 1 Shop</h1>
        </header>
        <main>
            <section>
                <form>
                    <input type="text" placeholder="Search...">
                    <button type="submit">Search</button>
                </form>
                <div class="product" style="border:1px solid #e8e8e8;">
                    <h2>Product Title</h2>
                    <p>Description of the product.</p>
                    <button class="add-to-cart" style="border:none;cursor:pointer;width:100%;margin-bottom:6px;">Add to Cart</button>
                </div>
            </section>
        </main>
    </div>
</body>
</html>
