<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>All-in1 ShopStar - Smarta Hem Fynd Sverige</title>
<meta name="description" content="Smarta hem, halsa och fitness under 500kr. Handplockade Amazon-fynd med toppbetyg.">
<meta name="keywords" content="smarta hem, smart plug, tapo, fire tv stick, shelly, omega3, vitamin, whey protein, Sverige, amazon fynd">
<meta name="robots" content="index, follow">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:Arial,sans-serif;background:#f0f2f5;min-height:100vh}

/* TICKER */
.ticker-wrap{background:#f5a623;overflow:hidden;padding:7px 0;white-space:nowrap}
.ticker-inner{display:inline-block;animation:tick 30s linear infinite}
@keyframes tick{from{transform:translateX(100vw)}to{transform:translateX(-100%)}}
.ticker-inner span{font-size:12px;font-weight:bold;color:#000;margin-right:50px}
.ticker-inner span::before{content:"★ "}

/* LIVE BAR */
.live-bar{background:#111;color:#ccc;font-size:11px;padding:6px 16px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.live-dot{width:7px;height:7px;border-radius:50%;background:#ff4444;animation:blink 1s infinite;flex-shrink:0}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.amz-badge{background:rgba(245,166,35,.2);border:1px solid #f5a623;color:#f5a623;font-size:10px;font-weight:bold;padding:2px 9px;border-radius:20px;margin-left:auto}

/* HEADER */
header{background:#111;color:white;padding:12px 16px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;position:sticky;top:0;z-index:200}
.logo{font-size:20px;font-weight:bold;color:#f5a623;text-decoration:none;flex-shrink:0}
.logo span{color:white}
.header-soc{margin-left:auto;display:flex;gap:8px}
.header-soc a{background:#222;color:#ccc;padding:5px 10px;border-radius:6px;font-size:11px;font-weight:bold;text-decoration:none}

/* LAYOUT */
.layout{display:flex;max-width:1200px;margin:0 auto}

/* SIDEBAR */
.sidebar{width:220px;flex-shrink:0;background:white;padding:20px 16px;border-right:1px solid #ddd;min-height:100vh}
.sidebar h2{font-size:15px;color:#111;margin-bottom:14px;border-bottom:2px solid #f5a623;padding-bottom:8px}
.sidebar a{display:flex;align-items:center;gap:8px;color:#333;margin:8px 0;text-decoration:none;font-size:13px;padding:7px 10px;border-radius:8px;transition:background .2s}
.sidebar a:hover,.sidebar a.active{background:#fff3e0;color:#e65c00;font-weight:bold}
.sidebar .trust{margin-top:20px;background:#f9f9f9;border-radius:10px;padding:12px;font-size:11px;color:#666;line-height:1.8}
.sidebar .trust strong{display:block;color:#111;font-size:12px;margin-bottom:6px}

/* MAIN */
.main{flex:1;padding:18px;min-width:0}

/* HERO */
.hero-box{background:linear-gradient(135deg,#111 0%,#1a1428 100%);color:white;border-radius:14px;padding:24px;margin-bottom:22px;text-align:center}
.hero-box h1{font-size:22px;margin-bottom:8px}
.hero-box h1 em{color:#f5a623;font-style:normal}
.hero-box p{font-size:13px;color:#aaa;max-width:400px;margin:0 auto 16px}
.hero-stats{display:flex;justify-content:center;gap:24px;flex-wrap:wrap}
.hstat strong{display:block;font-size:20px;color:#f5a623;font-weight:bold}
.hstat span{font-size:11px;color:#888}

/* SECTION */
.sec-title{font-size:17px;font-weight:bold;color:#111;margin:22px 0 12px;display:flex;align-items:center;gap:8px;border-left:4px solid #f5a623;padding-left:10px}

/* GRID */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px;margin-bottom:10px}

/* CARD */
.card{background:white;border-radius:12px;overflow:hidden;transition:transform .2s,box-shadow .2s;position:relative;display:flex;flex-direction:column;text-decoration:none;color:inherit;border:1px solid #e8e8e8}
.card:hover{transform:translateY(-3px);box-shadow:0 8px 24px rgba(0,0,0,.12);border-color:#f5a623}
.card:active{transform:scale(.98)}
.card-img{width:100%;height:180px;object-fit:cover;background:#f5f5f5;display:block}
.card-body{padding:12px;flex:1;display:flex;flex-direction:column}
.card-badge{display:inline-block;font-size:9px;font-weight:900;text-transform:uppercase;padding:2px 7px;border-radius:4px;margin-bottom:7px;letter-spacing:.5px}
.badge-green{background:#00c853;color:#000}
.badge-red{background:#ff3d00;color:#fff}
.badge-blue{background:#0288d1;color:#fff}
.badge-orange{background:#f5a623;color:#000}
.card-title{font-size:13px;font-weight:bold;line-height:1.4;margin-bottom:6px;flex:1}
.card-stars{color:#f5a623;font-size:12px;margin-bottom:4px}
.card-reviews{font-size:10px;color:#888}
.card-price{font-size:22px;font-weight:bold;color:#cc0000;margin:8px 0 4px}
.card-desc{font-size:11px;color:#666;line-height:1.5;margin-bottom:10px}
.card-info{display:none;font-size:12px;color:#444;background:#f9f9f9;border-radius:8px;padding:10px;margin-bottom:8px;line-height:1.6}
.card-review-q{font-style:italic;color:#555;margin-top:5px;font-size:11px}
.card-review-q::before{content:'"'}
.card-review-q::after{content:'"'}
.btn-amz{display:block;background:linear-gradient(90deg,#f5a623,#e8910a);color:#000;text-align:center;padding:10px;border-radius:8px;font-weight:bold;font-size:13px;text-decoration:none;border:none;cursor:pointer;width:100%;margin-bottom:6px}
.btn-info{display:block;background:#f0f0f0;color:#333;text-align:center;padding:8px;border-radius:8px;font-size:12px;border:none;cursor:pointer;width:100%}
.btn-info:hover{background:#e0e0e0}
.viewers-badge{position:absolute;top:8px;right:8px;background:rgba(0,0,0,.7);color:#00e676;font-size:9px;font-weight:bold;padding:2px 7px;border-radius:20px}

/* CHAT */
.chat-fab{position:fixed;bottom:18px;right:14px;z-index:999;background:#1a1d26;border:1px solid #333;border-radius:24px;padding:9px 13px;display:flex;align-items:center;gap:7px;cursor:pointer;box-shadow:0 4px 18px rgba(0,0,0,.4)}
.gdot*
